services:

  postgres:
    image: postgres:17
    container_name: knowledgehub_postgres

    restart: unless-stopped

    environment:
      POSTGRES_DB: knowledgehub
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d knowledgehub"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest

    container_name: knowledgehub_qdrant

    restart: unless-stopped

    ports:
      - "6333:6333"
      - "6334:6334"

    volumes:
      - qdrant_data:/qdrant/storage

volumes:

  postgres_data:

  qdrant_data: