services:

  postgres:
    image: postgres:17
    container_name: knowledgehub_postgres

    restart: unless-stopped

    environment:
      POSTGRES_DB: knowledgehub
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d knowledgehub"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest

    container_name: knowledgehub_qdrant

    restart: unless-stopped

    ports:
      - "6333:6333"
      - "6334:6334"

    volumes:
      - qdrant_data:/qdrant/storage

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile

    container_name: knowledgehub_backend

    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started

    env_file:
      - backend/.env

    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/knowledgehub
      QDRANT_URL: http://qdrant:6333
      WATCHFILES_FORCE_POLLING: "true"

    ports:
      - "8000:8000"

    volumes:
      - ./backend:/app/backend

  frontend:
    build:
      context: ./frontend

    container_name: knowledgehub_frontend

    restart: unless-stopped

    environment:
      VITE_API_URL: http://localhost:8000

    ports:
      - "5173:5173"

    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:

  postgres_data:

  qdrant_data:

  frontend_node_modules: